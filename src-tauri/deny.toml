# cargo-deny configuration
# S27-009: Rust license/advisory checking

[advisories]
# Deny any advisories with severity >= "medium"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"

[licenses]
# Deny licenses not in the allow list
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
# Warn on duplicate versions
multiple-versions = "warn"
wildcards = "deny"
