name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          package-name: micontrol
          # Conventional commit types that trigger releases:
          #   feat:     → minor bump
          #   fix:      → patch bump
          #   feat!:    → major bump (breaking)
          #   fix!:     → major bump (breaking)
          #   chore, docs, refactor, test, ci, style, perf → no release
          #
          # The action will:
          #   1. Maintain a "release PR" that accumulates version bump + changelog
          #   2. When the release PR is merged, it creates a git tag (vX.Y.Z)
          #   3. The tag push triggers release.yml to build + sign + publish
          changelog-types: |
            [
              { "type": "feat",     "section": "✨ Features",          "hidden": false },
              { "type": "fix",      "section": "🐛 Bug Fixes",         "hidden": false },
              { "type": "perf",     "section": "⚡ Performance",       "hidden": false },
              { "type": "refactor", "section": "♻️ Refactoring",       "hidden": true  },
              { "type": "docs",     "section": "📚 Documentation",    "hidden": true  },
              { "type": "chore",    "section": "🔧 Miscellaneous",     "hidden": true  },
              { "type": "ci",       "section": "👷 CI/CD",             "hidden": true  },
              { "type": "test",     "section": "🧪 Tests",              "hidden": true  },
              { "type": "style",    "section": "💎 Style",             "hidden": true  }
            ]
          # Sync version across all config files after bump
          extra-files: |
            src-tauri/Cargo.toml
            src-tauri/tauri.conf.json
