name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Sign Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write  # Required to create GitHub Release

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@a54c799925e5816e3d6ce8a3d7f2b1d4f1b3e5c8 # stable

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3907afe6564 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync versions
        run: npm run version:sync

      - name: Cache cargo
        uses: actions/cache@6849a6489940f01f8475df2b1b9d7f6c5e8b6b1f # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Verify signing key is provided
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is required for releases."
            echo "::error::See docs/release.md for setup instructions."
            echo "::error::Generate a keypair with: npx @tauri-apps/cli signer generate -w ~/.tauri/micontrol-key"
            echo "::error::Then add the private key as a repository secret named TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          fi
          echo "Signing key is present."

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sign installer with Authenticode
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$WINDOWS_CERTIFICATE" ]; then
            echo "::warning::WINDOWS_CERTIFICATE secret not set. Skipping code signing."
            echo "::warning::Users will see SmartScreen warnings when installing."
            exit 0
          fi

          # Decode the certificate from base64
          echo "$WINDOWS_CERTIFICATE" | base64 -d > cert.pfx

          # Find the MSI installer
          MSI_PATH=$(find src-tauri/target/release/bundle -name "*.msi" -type f | head -1)
          EXE_PATH=$(find src-tauri/target/release/bundle -name "*.exe" -type f | head -1)

          # Sign the MSI installer
          if [ -n "$MSI_PATH" ]; then
            echo "Signing $MSI_PATH..."
            signtool sign /f cert.pfx /p "$WINDOWS_CERTIFICATE_PASSWORD" \
              /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com \
              "$MSI_PATH" || echo "::warning::MSI signing failed"
          fi

          # Sign the EXE if it exists
          if [ -n "$EXE_PATH" ]; then
            echo "Signing $EXE_PATH..."
            signtool sign /f cert.pfx /p "$WINDOWS_CERTIFICATE_PASSWORD" \
              /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com \
              "$EXE_PATH" || echo "::warning::EXE signing failed"
          fi

          # Clean up the certificate file
          rm -f cert.pfx
        shell: bash

      - name: Generate latest.json updater manifest
        run: |
          $version = node -p "require('./package.json').version"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $tagName = "${{ github.ref_name }}"
          $releaseUrl = "https://github.com/${{ github.repository }}/releases/tag/$tagName"

          # Find installers — prefer .nsis (exe) over .msi
          $nsis = Get-ChildItem -Path src-tauri/target/release/bundle -Filter "*.exe" -Recurse | Select-Object -First 1
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle -Filter "*.msi" -Recurse | Select-Object -First 1

          $installerName = if ($nsis) { $nsis.Name } elseif ($msi) { $msi.Name } else { "micontrol_${version}_x64-setup.exe" }
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/latest/download/$installerName"

          # Find the .sig signature file matching the installer
          $installerBase = if ($nsis) { $nsis.FullName } elseif ($msi) { $msi.FullName } else { $null }
          $signature = ""
          if ($installerBase) {
            $sigFile = "${installerBase}.sig"
            if (Test-Path $sigFile) { $signature = Get-Content $sigFile -Raw }
          }

          $manifest = @{
            version = $version
            notes = "See full changelog at https://github.com/${{ github.repository }}/releases"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          $manifest | Out-File -FilePath latest.json -Encoding utf8
          Write-Host "Generated latest.json:"
          Get-Content latest.json
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tauri-release-artifacts
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}