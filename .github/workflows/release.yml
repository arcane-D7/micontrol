name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Sign Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write  # Required to create GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync versions
        run: npm run version:sync

      - name: Verify git tag matches package.json version
        shell: pwsh
        run: |
          $pkgVersion = node -p "require('./package.json').version"
          $tagName = "${{ github.ref_name }}"
          # Strip leading 'v' from tag for comparison
          $tagVersion = $tagName -replace '^v', ''
          if ($pkgVersion -ne $tagVersion) {
            Write-Host "::error::Version mismatch: package.json=$pkgVersion, git tag=$tagVersion"
            exit 1
          }
          Write-Host "Version verified: $pkgVersion"

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-${{ env.CARGO_AUDIT_VERSION }}
        env:
          CARGO_AUDIT_VERSION: '0.18.3'

      - name: Run cargo audit
        run: |
          if ! command -v cargo-audit &>/dev/null; then
            cargo install cargo-audit --locked
          fi
          cargo audit --deny warnings

      - name: Run npm audit
        run: npm audit --audit-level=moderate

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Verify signing key is provided
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY secret is required for releases."
            Write-Host "::error::See docs/release.md for setup instructions."
            Write-Host "::error::Generate a keypair with: npx @tauri-apps/cli signer generate -w ~/.tauri/micontrol-key"
            Write-Host "::error::Then add the private key as a repository secret named TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          }
          Write-Host "Signing key is present."

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Frontend tests
        run: npx vitest run

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sign installer with Authenticode
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) {
            Write-Host "::error::WINDOWS_CERTIFICATE secret is required for production releases"
            exit 1
          }

          # Decode the certificate from base64
          [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE) | Set-Content -Path cert.pfx -AsByteStream

          # Find the NSIS installer (only NSIS is supported, no MSI)
          $exePath = Get-ChildItem -Path src-tauri/target/release/bundle -Filter "*.exe" -Recurse | Select-Object -First 1

          # Sign the EXE installer — fail the build if signing fails
          if ($exePath) {
            Write-Host "Signing $($exePath.FullName)..."
            signtool sign /f cert.pfx /p "$env:WINDOWS_CERTIFICATE_PASSWORD" `
              /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
              "$($exePath.FullName)"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Code signing failed for $($exePath.FullName)"
              Remove-Item -Path cert.pfx -Force -ErrorAction SilentlyContinue
              exit 1
            }
            # Verify the signature
            signtool verify /pa /v "$($exePath.FullName)"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Signature verification failed for $($exePath.FullName)"
              Remove-Item -Path cert.pfx -Force -ErrorAction SilentlyContinue
              exit 1
            }
            Write-Host "Code signing successful and verified."
          } else {
            Write-Host "::warning::No EXE installer found to sign"
          }

          # Clean up the certificate file
          Remove-Item -Path cert.pfx -Force -ErrorAction SilentlyContinue

      - name: Generate latest.json updater manifest
        run: |
          $version = node -p "require('./package.json').version"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $tagName = "${{ github.ref_name }}"
          $releaseUrl = "https://github.com/${{ github.repository }}/releases/tag/$tagName"

          # Find the NSIS installer (only NSIS is supported)
          $nsis = Get-ChildItem -Path src-tauri/target/release/bundle -Filter "*.exe" -Recurse | Select-Object -First 1

          $installerName = if ($nsis) { $nsis.Name } else { "micontrol_${version}_x64-setup.exe" }
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/latest/download/$installerName"

          # Find the .sig signature file matching the installer
          $installerBase = if ($nsis) { $nsis.FullName } else { $null }
          $signature = ""
          if ($installerBase) {
            $sigFile = "${installerBase}.sig"
            if (Test-Path $sigFile) { $signature = Get-Content $sigFile -Raw }
          }

          $manifest = @{
            version = $version
            notes = "See full changelog at https://github.com/${{ github.repository }}/releases"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          $manifest | Out-File -FilePath latest.json -Encoding utf8
          Write-Host "Generated latest.json:"
          Get-Content latest.json
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}