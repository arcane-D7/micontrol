name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Publish Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync versions
        run: npm run version:sync

      - name: Verify git tag matches package.json version
        shell: pwsh
        run: |
          $pkgVersion = node -p "require('./package.json').version"
          $tagName = "${{ github.ref_name }}"
          $tagVersion = $tagName -replace '^v', ''
          if ($pkgVersion -ne $tagVersion) {
            Write-Host "::error::Version mismatch: package.json=$pkgVersion, git tag=$tagVersion"
            exit 1
          }
          Write-Host "Version verified: $pkgVersion"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Verify signing key is provided
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY secret is required for releases."
            exit 1
          }
          Write-Host "Signing key is present."

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sign installer with Authenticode (optional)
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) {
            Write-Host "::notice::WINDOWS_CERTIFICATE not set — skipping Authenticode signing."
            exit 0
          }

          [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE) | Set-Content -Path cert.pfx -AsByteStream

          $exePath = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*.exe" -Recurse | Select-Object -First 1

          if ($exePath) {
            Write-Host "Signing $($exePath.FullName)..."
            signtool sign /f cert.pfx /p "$env:WINDOWS_CERTIFICATE_PASSWORD" `
              /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
              "$($exePath.FullName)"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Code signing failed for $($exePath.FullName)"
              Remove-Item -Path cert.pfx -Force -ErrorAction SilentlyContinue
              exit 1
            }
            Write-Host "Code signing successful."
          } else {
            Write-Host "::warning::No EXE installer found to sign"
          }

          Remove-Item -Path cert.pfx -Force -ErrorAction SilentlyContinue

      - name: Generate latest.json updater manifest
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $nsis = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*.exe" -Recurse | Select-Object -First 1

          $installerName = if ($nsis) { $nsis.Name } else { "micontrol_${version}_x64-setup.exe" }
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/latest/download/$installerName"

          $signature = ""
          if ($nsis) {
            $sigFile = "$($nsis.FullName).sig"
            if (Test-Path $sigFile) { $signature = Get-Content $sigFile -Raw }
          }

          $manifest = @{
            version = $version
            notes = "See full changelog at https://github.com/${{ github.repository }}/releases"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          $manifest | Out-File -FilePath latest.json -Encoding utf8
          Write-Host "Generated latest.json:"
          Get-Content latest.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}