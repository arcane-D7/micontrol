name: Auto Release

# Fully automated semantic-release pipeline.
#
# On every push to main, analyzes conventional commits and determines
# whether a release is needed (feat → minor, fix/perf/revert → patch,
# BREAKING CHANGE → major).
#
# If a release is needed:
#   1. Bumps version in package.json, Cargo.toml, tauri.conf.json
#   2. Updates CHANGELOG.md
#   3. Commits + tags + pushes to main
#   4. Runs health checks (fmt, clippy, test, lint, tsc, build)
#   5. Builds the Tauri app with signing
#   6. Creates a GitHub Release with artifacts + latest.json
#
# This workflow does NOT create a pull request (which would require
# org-level "Allow GitHub Actions to create pull requests" permission).
# Instead, it commits directly to main and creates the tag.
#
# NOTE: We cannot use a separate release.yml triggered by tag push because
# GitHub Actions does not trigger workflows on pushes made with GITHUB_TOKEN.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a release even if no releasable commits found'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Job 1: Analyze commits & create tag ───────────────────────────
  analyze:
    name: Analyze & Tag
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'
    outputs:
      should_release: ${{ steps.analyze.outputs.should_release }}
      new_version: ${{ steps.analyze.outputs.new_version }}
      bump_type: ${{ steps.analyze.outputs.bump_type }}
      tag_name: ${{ steps.analyze.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for commit analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Analyze commits and determine version bump
        id: analyze
        shell: node {0}
        run: |
          const { execSync } = require('child_process');
          const fs = require('fs');

          // Get the latest tag
          let latestTag = '';
          try {
            latestTag = execSync('git describe --tags --abbrev=0', { encoding: 'utf8' }).trim();
          } catch {
            console.log('No previous tags found — this is the first release.');
          }

          // Get commits since the latest tag (or all commits if no tag)
          const range = latestTag ? `${latestTag}..HEAD` : 'HEAD';
          let commits;
          try {
            commits = execSync(`git log --format="%H%x1f%s%x1f%b%x1e" ${range}`, { encoding: 'utf8' });
          } catch {
            console.log('No commits to analyze.');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'should_release=false\n');
            process.exit(0);
          }

          // Parse commits
          const commitEntries = commits.split('\x1e').filter(c => c.trim());
          const parsed = commitEntries.map(entry => {
            const [hash, subject, body] = entry.split('\x1f');
            return { hash: hash.trim(), subject: subject.trim(), body: body.trim() };
          });

          // Conventional commit regex: type(scope)!: subject
          const ccRegex = /^(feat|fix|perf|refactor|docs|chore|test|ci|style|build|revert)(\([^)]+\))?(!)?:\s*(.+)$/i;

          let hasFeat = false;
          let hasFix = false;
          let hasPerf = false;
          let hasBreaking = false;
          let hasRevert = false;
          const changelogEntries = { feat: [], fix: [], perf: [], other: [] };

          for (const commit of parsed) {
            const match = commit.subject.match(ccRegex);
            if (!match) continue;

            const [, type, scope, breaking, subject] = match;
            const isBreaking = !!breaking || /BREAKING CHANGE:/i.test(commit.body);

            if (isBreaking) hasBreaking = true;
            if (type === 'feat') hasFeat = true;
            if (type === 'fix') hasFix = true;
            if (type === 'perf') hasPerf = true;
            if (type === 'revert') hasRevert = true;

            // Collect changelog entries
            const entry = `- ${subject}${scope ? ` (${scope})` : ''}`;
            if (['feat', 'fix', 'perf'].includes(type)) {
              changelogEntries[type].push(entry);
            }
          }

          // Determine bump type
          let bumpType = 'none';
          if (hasBreaking) bumpType = 'major';
          else if (hasFeat) bumpType = 'minor';
          else if (hasFix || hasPerf || hasRevert) bumpType = 'patch';

          // Check for force release
          const forceRelease = '${{ github.event.inputs.force }}' === 'true';
          if (bumpType === 'none' && !forceRelease) {
            console.log('No releasable commits found (need feat:, fix:, perf:, or revert:)');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'should_release=false\n');
            process.exit(0);
          }

          if (bumpType === 'none' && forceRelease) {
            bumpType = 'patch';
          }

          // Read current version
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const currentVersion = pkg.version;
          const [major, minor, patch] = currentVersion.split('.').map(Number);

          let newVersion;
          switch (bumpType) {
            case 'major':
              newVersion = `${major + 1}.0.0`;
              break;
            case 'minor':
              newVersion = `${major}.${minor + 1}.0`;
              break;
            case 'patch':
              newVersion = `${major}.${minor}.${patch + 1}`;
              break;
          }

          const tagName = `v${newVersion}`;
          console.log(`Bump type: ${bumpType}`);
          console.log(`Current version: ${currentVersion}`);
          console.log(`New version: ${newVersion}`);
          console.log(`Tag: ${tagName}`);

          // Build changelog section
          const today = new Date().toISOString().split('T')[0];
          let changelogSection = `## [${newVersion}] - ${today}\n\n`;

          if (changelogEntries.feat.length > 0) {
            changelogSection += `### Features\n\n${changelogEntries.feat.join('\n')}\n\n`;
          }
          if (changelogEntries.fix.length > 0) {
            changelogSection += `### Bug Fixes\n\n${changelogEntries.fix.join('\n')}\n\n`;
          }
          if (changelogEntries.perf.length > 0) {
            changelogSection += `### Performance\n\n${changelogEntries.perf.join('\n')}\n\n`;
          }

          // Write outputs to GITHUB_OUTPUT (replaces deprecated ::set-output)
          const outputs = {
            should_release: 'true',
            bump_type: bumpType,
            current_version: currentVersion,
            new_version: newVersion,
            tag_name: tagName,
          };

          for (const [key, value] of Object.entries(outputs)) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${value}\n`);
          }

          // Write changelog section to a temp file for the next step
          fs.writeFileSync('/tmp/changelog_section.md', changelogSection);

      - name: Skip release (no releasable commits)
        if: steps.analyze.outputs.should_release != 'true'
        run: |
          echo "No releasable commits found. Skipping release."
          echo "To force a release, use workflow_dispatch with force=true."

      - name: Bump version
        if: steps.analyze.outputs.should_release == 'true'
        run: |
          echo "Bumping version to ${{ steps.analyze.outputs.new_version }}"
          node scripts/sync-version.cjs ${{ steps.analyze.outputs.new_version }}

      - name: Update CHANGELOG.md
        if: steps.analyze.outputs.should_release == 'true'
        shell: node {0}
        run: |
          const fs = require('fs');
          const changelogPath = 'CHANGELOG.md';
          const newSection = fs.readFileSync('/tmp/changelog_section.md', 'utf8');

          let content = '';
          if (fs.existsSync(changelogPath)) {
            content = fs.readFileSync(changelogPath, 'utf8');
            // Insert new section after the [Unreleased] line
            const pattern = /(## \[Unreleased\][^\r\n]*)/;
            if (pattern.test(content)) {
              content = content.replace(pattern, `$1\n\n${newSection}`);
            } else {
              // No [Unreleased] section — prepend after header
              content = `# Changelog\n\n${newSection}\n${content}`;
            }
          } else {
            content = `# Changelog\n\n${newSection}`;
          }
          fs.writeFileSync(changelogPath, content, 'utf8');
          console.log('Updated CHANGELOG.md');
          console.log(content.split('\n').slice(0, 20).join('\n'));

      - name: Commit version bump and create tag
        if: steps.analyze.outputs.should_release == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          new_version="${{ steps.analyze.outputs.new_version }}"
          tag_name="${{ steps.analyze.outputs.tag_name }}"
          bump_type="${{ steps.analyze.outputs.bump_type }}"

          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json CHANGELOG.md
          git commit -m "chore(release): ${tag_name}

          Release ${tag_name} — ${bump_type} bump"
          git tag -a "$tag_name" -m "Release $tag_name"
          git push origin main
          git push origin "$tag_name"

          echo "Created and pushed tag $tag_name"

  # ─── Job 2: Health checks ──────────────────────────────────────────
  health-check:
    name: Pre-Release Health Checks
    runs-on: windows-latest
    needs: analyze
    if: needs.analyze.outputs.should_release == 'true'
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.analyze.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Version consistency check
        run: npm run version:check

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Rust formatting check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust type check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Rust clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml -- --test-threads=1
        env:
          RUST_TEST_THREADS: "1"

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Frontend build
        run: npm run build

      - name: i18n completeness check
        run: node scripts/check-i18n.mjs

  # ─── Job 3: Build & Publish ────────────────────────────────────────
  release:
    name: Build & Publish Release (Windows)
    runs-on: windows-latest
    needs: [analyze, health-check]
    if: needs.analyze.outputs.should_release == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.analyze.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Verify signing key is provided
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY secret is required for releases."
            exit 1
          }
          Write-Host "Signing key is present."

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sign installer with Authenticode (optional)
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) {
            Write-Host "::notice::WINDOWS_CERTIFICATE not set — skipping Authenticode signing."
            exit 0
          }

          [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE) | Set-Content -Path cert.pfx -AsByteStream

          $exePath = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*.exe" -Recurse | Select-Object -First 1

          if ($exePath) {
            Write-Host "Signing $($exePath.FullName)..."
            signtool sign /f cert.pfx /p "$env:WINDOWS_CERTIFICATE_PASSWORD" `
              /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
              "$($exePath.FullName)"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Code signing failed for $($exePath.FullName)"
              Remove-Item -Path cert.pfx -Force -ErrorAction SilentlyContinue
              exit 1
            }
            Write-Host "Code signing successful."
          } else {
            Write-Host "::warning::No EXE installer found to sign"
          }

          Remove-Item -Path cert.pfx -Force -ErrorAction SilentlyContinue

      - name: Generate latest.json updater manifest
        shell: pwsh
        run: |
          $version = "${{ needs.analyze.outputs.new_version }}"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $nsis = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*.exe" -Recurse | Select-Object -First 1

          $installerName = if ($nsis) { $nsis.Name } else { "micontrol_${version}_x64-setup.exe" }
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/latest/download/$installerName"

          $signature = ""
          if ($nsis) {
            $sigFile = "$($nsis.FullName).sig"
            if (Test-Path $sigFile) { $signature = Get-Content $sigFile -Raw }
          }

          $manifest = @{
            version = $version
            notes = "See full changelog at https://github.com/${{ github.repository }}/releases"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          $manifest | Out-File -FilePath latest.json -Encoding utf8
          Write-Host "Generated latest.json:"
          Get-Content latest.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.analyze.outputs.tag_name }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.analyze.outputs.tag_name, '-') }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
