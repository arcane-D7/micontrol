name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions: read-all

jobs:
  rust:
    name: Rust (check + clippy + test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml -- --test-threads=1
        env:
          RUST_TEST_THREADS: "1"

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-${{ env.CARGO_AUDIT_VERSION }}

      - name: Install cargo-audit
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-audit -ErrorAction SilentlyContinue)) {
            cargo install cargo-audit --locked
          }
        env:
          CARGO_AUDIT_VERSION: '0.18.3'

      - name: Run cargo audit
        run: cargo audit --file src-tauri/Cargo.lock
        continue-on-error: true

      - name: Install cargo-deny
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-deny -ErrorAction SilentlyContinue)) {
            cargo install cargo-deny --locked
          }

      - name: Run cargo-deny
        run: cargo deny --manifest-path src-tauri/Cargo.toml check

  frontend:
    name: Frontend (build + lint + format)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  coverage-rust:
    name: Rust coverage
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-tarpaulin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: ${{ runner.os }}-cargo-tarpaulin-${{ env.CARGO_TARPAULIN_VERSION }}

      - name: Install cargo-tarpaulin
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-tarpaulin -ErrorAction SilentlyContinue)) {
            cargo install cargo-tarpaulin
          }
        env:
          CARGO_TARPAULIN_VERSION: '0.27.3'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Run cargo-tarpaulin
        run: cargo tarpaulin --manifest-path src-tauri/Cargo.toml --out xml --output-dir coverage/

      - name: Upload coverage to Codecov
        # CODECOV_TOKEN must be configured as a repository secret.
        # See: https://docs.codecov.com/docs/adding-the-codecov-token
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  coverage-frontend:
    name: Frontend coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run vitest with coverage
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        # CODECOV_TOKEN must be configured as a repository secret.
        # See: https://docs.codecov.com/docs/adding-the-codecov-token
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  tauri-smoke:
    name: Tauri Build (smoke test)
    runs-on: windows-latest
    # Only run on main branch pushes, not PRs (to keep PR CI fast)
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-tauri-

      - name: Tauri build
        run: npm run tauri build

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run version:check

  i18n-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/check-i18n.mjs

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7