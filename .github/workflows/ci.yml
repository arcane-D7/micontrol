name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

permissions: read-all

jobs:
  rust:
    name: Rust (check + clippy + test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@a54c799925e5816e3d6ce8a3d7f2b1d4f1b3e5c8 # stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@6849a6489940f01f8475df2b1b9d7f6c5e8b6b1f # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --deny warnings

  frontend:
    name: Frontend (build + lint + format)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3907afe6564 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  coverage-rust:
    name: Rust coverage
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@a54c799925e5816e3d6ce8a3d7f2b1d4f1b3e5c8 # stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache cargo registry
        uses: actions/cache@6849a6489940f01f8475df2b1b9d7f6c5e8b6b1f # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Run cargo-tarpaulin
        run: cargo tarpaulin --manifest-path src-tauri/Cargo.toml --out xml --output-dir coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9f0e1e4e5b1f3a7c9d2e8b6f4a1c3d5e7b9f2a6 # v4
        with:
          files: ./coverage/cobertura.xml
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  coverage-frontend:
    name: Frontend coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3907afe6564 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run vitest with coverage
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9f0e1e4e5b1f3a7c9d2e8b6f4a1c3d5e7b9f2a6 # v4
        with:
          files: ./coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  tauri-smoke:
    name: Tauri Build (smoke test)
    runs-on: windows-latest
    # Only run on main branch pushes, not PRs (to keep PR CI fast)
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@a54c799925e5816e3d6ce8a3d7f2b1d4f1b3e5c8 # stable

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3907afe6564 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache cargo
        uses: actions/cache@6849a6489940f01f8475df2b1b9d7f6c5e8b6b1f # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-tauri-

      - name: Tauri build
        run: npm run tauri build

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3907afe6564 # v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run version:check

  i18n-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3907afe6564 # v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/check-i18n.mjs